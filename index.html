<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>NH ESPORTS — Tournament Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════
   NH ESPORTS — GOLD PROTOCOL EDITION
   ════════════════════════════════════════ */
*{-webkit-tap-highlight-color:rgba(0,0,0,0);box-sizing:border-box;margin:0;padding:0;}
button,a,div,span,img,input,textarea,select,label{outline:none;-webkit-tap-highlight-color:transparent;}
img{-webkit-user-drag:none;-webkit-touch-callout:none;user-select:none;}
body{user-select:none;-webkit-user-select:none;font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
input,textarea{user-select:text;-webkit-user-select:text;}
:focus{outline:none;}
button,a,.card,.item{cursor:pointer;}
::selection{background:rgba(255,198,26,0.35);color:#fff;}

html,body{background:var(--bg);color:var(--text);min-height:100vh;}

:root{
  --bg:#07080a;
  --bg2:#0d0e11;
  --panel:#151619;
  --panel2:#1c1e22;
  --line:rgba(255,255,255,0.08);
  --line-strong:rgba(255,198,26,0.35);
  --text:#f5f6f8;
  --text-dim:rgba(245,246,248,0.58);
  --text-faint:rgba(245,246,248,0.34);
  --gold:#ffc61a;
  --gold2:#ff9d00;
  --gold-soft:rgba(255,198,26,0.14);
  --green:#2fe28a;
  --green-soft:rgba(47,226,138,0.14);
  --amber:#ff9d2e;
  --amber-soft:rgba(255,157,46,0.14);
  --red:#ff3d4d;
  --red-soft:rgba(255,61,77,0.14);
  /* legacy aliases used by inline styles in markup/JS */
  --violet:var(--gold);
  --blue:var(--gold);
  --blue-dark:var(--gold2);
  --black:#000;
  --text2:var(--text-dim);
  --cyan:var(--green);
  --orange:var(--amber);
}

/* ── MOTION ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.15;}}
@keyframes barFill{from{width:0;}to{width:100%;}}
@keyframes checkPop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(255,198,26,0.35);}50%{box-shadow:0 0 0 7px rgba(255,198,26,0);}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes goldSweep{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes streakMove{0%{transform:translateX(-30%) skewX(-18deg);}100%{transform:translateX(130%) skewX(-18deg);}}
@keyframes ringSpin{to{transform:rotate(360deg);}}

/* ambient grid texture */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,198,26,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,198,26,0.03) 1px,transparent 1px);
  background-size:36px 36px;
}
#signal-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.5;}

/* ── ANGULAR CUT (signature device) ── */
.cut-tl-br{clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);}
.cut-sm{clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:hidden;}
#loader::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,198,26,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,198,26,0.05) 1px,transparent 1px);background-size:30px 30px;}
.loader-ring{position:relative;width:104px;height:104px;display:flex;align-items:center;justify-content:center;margin-bottom:26px;opacity:0;animation:fadeIn 0.6s ease 0.15s forwards;}
.loader-ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:3px solid rgba(255,198,26,0.15);}
.loader-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:var(--gold);border-right-color:var(--gold);animation:ringSpin 1.1s linear infinite;}
.loader-logo-img{width:52px;height:52px;object-fit:contain;}
.loader-brand{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(24px,7vw,38px);letter-spacing:1px;text-transform:uppercase;display:flex;align-items:baseline;gap:8px;margin-bottom:8px;color:var(--text);opacity:0;animation:fadeIn 0.6s ease 0.35s forwards;}
.loader-brand .dim{color:var(--gold);font-size:0.75em;}
.loader-caption{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;margin-bottom:22px;opacity:0;animation:fadeIn 0.6s ease 0.55s forwards;display:flex;align-items:center;gap:8px;}
.loader-bar{width:220px;height:3px;background:var(--line);overflow:hidden;opacity:0;animation:fadeIn 0.4s ease 0.6s forwards;}
.loader-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold2),var(--gold));animation:barFill 1.6s ease 0.7s forwards;}

/* ── NAVBAR ── */
nav{position:sticky;top:0;z-index:100;background:rgba(7,8,10,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:0 18px;height:58px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Orbitron',sans-serif;font-weight:800;font-size:15px;letter-spacing:1px;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:8px;text-transform:uppercase;}
.nav-mark{width:26px;height:26px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;clip-path:polygon(20% 0,100% 0,100% 80%,80% 100%,0 100%,0 20%);font-family:'Orbitron',sans-serif;font-weight:900;font-size:11px;color:#0a0a0a;}
.nav-logo .era{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;}
.logout-btn{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;padding:7px 12px;border:1px solid var(--line-strong);background:transparent;color:var(--text-dim);letter-spacing:1.5px;transition:all 0.2s;display:none;text-transform:uppercase;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
.menu-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;}
.user-avatar{width:28px;height:28px;background:var(--gold-soft);border:1px solid var(--gold);display:none;align-items:center;justify-content:center;color:var(--gold);font-size:11px;font-weight:800;font-family:'Orbitron',sans-serif;}

/* ── SIDEBAR ── */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.sidebar-overlay.open{opacity:1;pointer-events:all;}
.sidebar{position:fixed;right:0;top:0;bottom:0;width:270px;background:var(--panel);border-left:1px solid var(--line-strong);z-index:201;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;padding:22px 18px;}
.sidebar.open{transform:translateX(0);}
.sidebar-close{width:34px;height:34px;background:none;border:none;display:flex;align-items:center;justify-content:center;margin-bottom:30px;cursor:pointer;color:var(--text);}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:15px 0;border-bottom:1px solid var(--line);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--text-dim);text-decoration:none;transition:color 0.2s;text-transform:uppercase;}
.sidebar-link::before{content:'▸';color:var(--gold);}
.sidebar-link:hover{color:var(--text);}

/* ── SECTION TITLE ── */
.section-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--text);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.section-title::before{content:'';width:4px;height:14px;background:var(--gold);}
.section-title::after{content:'';flex:1;height:1px;background:var(--line);}

/* ── HERO ── */
.hero{position:relative;min-height:52vw;max-height:380px;overflow:hidden;background:var(--bg2);display:flex;align-items:flex-end;border-bottom:1px solid var(--line-strong);}
.hero-bg{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:0.55;filter:contrast(1.15) brightness(0.75) saturate(1.1);transition:opacity 0.5s;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,8,10,0.15) 0%,rgba(7,8,10,0.97) 100%),linear-gradient(120deg,rgba(255,198,26,0.14),transparent 55%);}
.hero-streak{position:absolute;top:0;bottom:0;width:26%;background:linear-gradient(90deg,transparent,rgba(255,198,26,0.09),transparent);animation:streakMove 5s ease-in-out infinite;pointer-events:none;}
.hero-content{position:relative;z-index:1;padding:28px 18px;width:100%;}
.hero-tag{display:inline-flex;align-items:center;gap:7px;background:var(--gold-soft);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;padding:6px 12px;border:1px solid var(--line-strong);margin-bottom:14px;text-transform:uppercase;clip-path:polygon(8px 0,100% 0,100% 100%,0 100%,0 8px);}
.hero-tag::before{content:'';width:6px;height:6px;background:var(--gold);border-radius:50%;}
.hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(28px,8vw,48px);font-weight:900;line-height:1.02;letter-spacing:-0.5px;text-transform:uppercase;color:var(--text);text-shadow:0 2px 20px rgba(0,0,0,0.5);}
.hero-title span{color:var(--gold);text-shadow:0 0 24px rgba(255,198,26,0.45);}
.hero-sub{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:3px;color:var(--text-dim);margin-top:10px;text-transform:uppercase;}

/* ── SECTION ── */
.section{padding:22px 16px;position:relative;z-index:1;}

/* ── MATCH CARD ── */
.match-card{background:var(--panel);border:1px solid var(--line);border-radius:2px;overflow:hidden;margin-bottom:18px;transition:transform 0.2s,border-color 0.2s;animation:cardIn 0.5s ease both;position:relative;}
.match-card:hover{border-color:var(--line-strong);transform:translateY(-2px);}
.match-banner{position:relative;aspect-ratio:16/8;overflow:hidden;background:var(--panel2);}
.match-banner img{width:100%;height:100%;object-fit:cover;filter:contrast(1.08) saturate(1.05);}
.match-banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(7,8,10,0.95) 100%);}
.match-banner-overlay::after{content:'';position:absolute;left:0;right:0;bottom:0;height:10px;background:linear-gradient(90deg,var(--gold),var(--gold2));clip-path:polygon(0 100%,4% 0,100% 0,100% 100%);}
.match-time-badge{position:absolute;top:10px;left:10px;background:rgba(7,8,10,0.85);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:6px 10px;border:1px solid var(--line-strong);display:flex;align-items:center;gap:5px;text-transform:uppercase;clip-path:polygon(6px 0,100% 0,100% 100%,0 100%,0 6px);}
.match-mode-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0a;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:800;letter-spacing:1px;padding:6px 10px;text-transform:uppercase;clip-path:polygon(0 0,100% 0,100% 100%,6px 100%,0 calc(100% - 6px));}
.match-body{padding:16px 16px 18px;}
.match-name{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:800;letter-spacing:0.2px;margin-bottom:14px;color:var(--text);text-transform:uppercase;padding-left:11px;border-left:3px solid var(--gold);}
.match-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-box{background:var(--panel2);border:1px solid var(--line);padding:10px 12px;}
.stat-label{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px;}
.stat-value{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--text);}
.stat-value.green{color:var(--green);}
.stat-value.blue{color:var(--gold);}

/* ── SLOT PROGRESS ── */
.slot-progress{margin-bottom:14px;}
.slot-progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.slot-progress-label{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;}
.slot-progress-count{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--text);}
.slot-bar-track{height:6px;background:var(--panel2);overflow:hidden;border:1px solid var(--line);}
.slot-bar-fill{height:100%;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);background:linear-gradient(90deg,var(--gold2),var(--gold));}

/* ── BUTTONS ── */
.register-btn,.submit-btn,.home-btn,.save-btn{
  width:100%;color:#0a0a0a;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:800;letter-spacing:1.5px;
  padding:15px;border:none;transition:all 0.2s;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));position:relative;overflow:hidden;
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
}
.register-btn:hover,.submit-btn:hover,.home-btn:hover,.save-btn:hover{filter:brightness(1.08);transform:translateY(-1px);}
.register-btn:active,.submit-btn:active{transform:scale(0.98);}
.register-btn:disabled,.register-btn[disabled]{pointer-events:none;}
.register-btn.state-confirmed{background:var(--green-soft);color:var(--green);border:1px solid rgba(47,226,138,0.4);}
.register-btn.state-verifying{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(255,157,46,0.4);}
.register-btn.state-closed{background:var(--panel2);color:var(--text-faint);border:1px solid var(--line);}

/* ── WINNER CARD ── */
.winner-card{background:var(--panel);border:1px solid rgba(47,226,138,0.4);padding:20px;margin-bottom:18px;position:relative;overflow:hidden;}
.winner-card::before{content:'CHAMPION';position:absolute;top:12px;right:14px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;color:var(--green);opacity:0.6;}
.winner-tag{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--green);text-transform:uppercase;margin-bottom:8px;}
.winner-name{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;letter-spacing:0.2px;color:var(--text);text-transform:uppercase;}
.winner-sub{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--text-dim);margin-top:5px;text-transform:uppercase;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:52px 20px;}
.empty-icon{animation:floatY 3s ease-in-out infinite;opacity:0.6;}
.empty-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;color:var(--text-dim);margin-top:16px;text-transform:uppercase;}
.empty-sub{font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--text-faint);margin-top:6px;letter-spacing:0.5px;}

/* ── BOTTOM SHEET (LOGIN) ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.bottom-sheet{position:fixed;left:0;right:0;bottom:0;background:var(--panel);border-top:1px solid var(--line-strong);z-index:201;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);padding:10px 22px 32px;text-align:center;}
.bottom-sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--line-strong);border-radius:2px;margin:0 auto 20px;}
.sheet-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:800;margin-bottom:9px;text-transform:uppercase;color:var(--text);}
.sheet-sub{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--text-dim);margin-bottom:22px;line-height:1.5;}
.google-btn{width:100%;background:#fff;color:#1a1a1a;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;padding:15px;border:none;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform 0.2s;text-transform:uppercase;letter-spacing:0.5px;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);}
.google-btn:hover{transform:translateY(-1px);}
.sheet-note{font-family:'Rajdhani',sans-serif;font-size:10px;color:var(--text-faint);margin-top:16px;letter-spacing:0.5px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--panel2);border:1px solid var(--line-strong);border-left:3px solid var(--gold);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.5px;padding:13px 20px;z-index:500;opacity:0;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);max-width:88vw;text-transform:uppercase;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── ICON ANIMATIONS ── */
button svg, a svg, .menu-btn svg, .sidebar-close svg, .register-btn svg, .google-btn svg{transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.menu-btn:hover svg,.menu-btn:active svg{transform:scale(1.15);}
.sidebar-close:hover svg{transform:rotate(90deg);}
.sidebar-link:hover svg{transform:translateX(3px);}
.match-time-badge svg{opacity:0.85;}
.register-btn:hover:not(:disabled) svg{transform:scale(1.15);}
.state-verifying svg{animation:spin 1.4s linear infinite;transform-origin:center;}
.state-confirmed svg{animation:checkPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;}

@media(min-width:640px){
  .section{padding:26px 32px;}
  #matches-container{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  #matches-container .winner-card,#matches-container .empty-state,#matches-container .section-title{grid-column:1/-1;}
}
</style>
</head>

<script>
(function(){
  const canvas=document.createElement('canvas');canvas.id='signal-canvas';document.body.insertBefore(canvas,document.body.firstChild);
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const dots=[];const DOT_COUNT=window.innerWidth<500?24:40;
  for(let i=0;i<DOT_COUNT;i++){dots.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:0.6+Math.random()*1.1,phase:Math.random()*Math.PI*2,speed:0.008+Math.random()*0.015});}
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const d of dots){
      d.phase+=d.speed;
      const a=0.05+Math.abs(Math.sin(d.phase))*0.13;
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,198,26,${a})`;ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

  <a href="index.html" class="nav-logo"><span class="nav-mark">NH</span>NH <span class="era">ESPORTS</span></a>
  <div class="nav-right">
    <div class="user-avatar" id="user-avatar"></div>
    <button class="logout-btn" id="logout-btn" onclick="doLogout()">LOGOUT</button>
    <button class="menu-btn" onclick="openSidebar()">
      <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
        <rect width="20" height="2" rx="1" fill="#f5f6f8"/>
        <rect y="6" width="14" height="2" rx="1" fill="#f5f6f8"/>
        <rect y="12" width="8" height="2" rx="1" fill="#ffc61a"/>
      </svg>
    </button>
  </div>
</nav>

<!-- HERO -->
<div class="hero" id="hero-section">
  <img class="hero-bg" id="hero-bg-img" src="" alt="" style="display:none;"/>
  <div class="hero-streak"></div>
  <div class="hero-overlay"></div>
  <div style="position:absolute;inset:0;" id="hero-bg-default"></div>
  <div class="hero-content">
    <div class="hero-tag" id="hero-tag">NH_OPERATIONS_V3</div>
    <div class="hero-title" id="hero-title">BATTLE IN <span id="hero-highlight">STYLE</span></div>
    <div class="hero-sub" id="hero-sub">ELITE ESPORTS ARENA</div>
  </div>
</div>

<!-- MATCHES -->
<div class="section">
  <div class="section-title">ACTIVE TOURNAMENTS</div>
  <div id="matches-container">
    <div style="text-align:center;padding:40px;">
      <div style="width:30px;height:30px;border:3px solid var(--gold);border-top-color:transparent;border-radius:50%;margin:0 auto 12px;animation:spin 0.8s linear infinite;"></div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:2px;">LOADING...</div>
    </div>
  </div>
</div>

<!-- LOGIN SHEET -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">JOIN THE BATTLE</div>
  <div class="sheet-sub">Sign in with Google to register your squad for this tournament.</div>
  <button class="google-btn" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    CONTINUE WITH GOOGLE
  </button>
  <div class="sheet-note">Your data is secure and only used for registration.</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
import{getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
import{getFirestore,collection,getDocs,query,orderBy,doc,getDoc,where,onSnapshot}from'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyDrg8CHeOGiPR9kFLSTreRbP4p8TGF9jMY",
  authDomain:"nothumans-7e285.firebaseapp.com",
  projectId:"nothumans-7e285",
  storageBucket:"nothumans-7e285.firebasestorage.app",
  messagingSenderId:"409725804600",
  appId:"1:409725804600:web:ec0344bf1ac49a55edc6cd"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

let currentUser=null;
let pendingMatchId=null;
let confirmedSlots={};
let userRegs={};
let slotCountsUnsub=null;

function setupSlotCountsListener(){
  if(slotCountsUnsub) slotCountsUnsub();
  slotCountsUnsub=onSnapshot(collection(db,'slotCounts'),(snapshot)=>{
    confirmedSlots={};
    snapshot.forEach((d)=>{const val=d.data().confirmed;if(typeof val==='number') confirmedSlots[d.id]=val;});
    const c=document.getElementById('matches-container');
    if(c){ loadMatches(); }
  },(err)=>{ console.warn('slotCounts realtime listener error:',err); });
}

setTimeout(()=>{
  const l=document.getElementById('loader');
  l.style.transition='opacity 0.6s';l.style.opacity='0';
  setTimeout(()=>l.style.display='none',600);
},2600);

onAuthStateChanged(auth,async user=>{
  currentUser=user;
  const lb=document.getElementById('logout-btn');
  const av=document.getElementById('user-avatar');
  if(user){
    lb.style.display='block';av.style.display='flex';
    av.textContent=user.displayName?user.displayName[0].toUpperCase():'U';
  }else{
    lb.style.display='none';av.style.display='none';userRegs={};
  }
  await loadData(user);
});

async function loadSocialLinks(){
  try{
    const snap=await getDoc(doc(db,'settings','global'));
    if(snap.exists()){
      const d=snap.data();
      if(d.instagram){let u=d.instagram.trim();if(!u.startsWith('http')) u='https://instagram.com/'+u.replace('@','');document.getElementById('link-instagram').href=u;}
      if(d.discord) document.getElementById('link-discord').href=d.discord.trim();
      if(d.whatsapp){let u=d.whatsapp.trim();if(!u.startsWith('http')) u='https://wa.me/'+u.replace(/\D/g,'');document.getElementById('link-whatsapp').href=u;}
    }
  }catch(e){}
}
loadSocialLinks();
setupSlotCountsListener();

async function loadData(user){
  confirmedSlots={};userRegs={};
  try{
    if(user){
      try{
        const regSnap=await getDocs(query(collection(db,'registrations'),where('userId','==',user.uid)));
        regSnap.forEach(d=>{
          const data=d.data();
          if(!userRegs[data.matchId] || data.status!=='rejected'){
            userRegs[data.matchId]={status:data.status||'verifying',docId:d.id};
          }
        });
      }catch(e){ console.warn('User regs load failed',e); }
    }
    try{
      const scSnap=await getDocs(collection(db,'slotCounts'));
      scSnap.forEach(d=>{const val=d.data().confirmed;if(typeof val==='number') confirmedSlots[d.id]=val;});
    }catch(e){ console.warn('slotCounts read failed',e); }
  }catch(e){ console.warn('loadData error',e); }
  await loadMatches();
}

async function loadMatches(){
  try{
    const snap=await getDocs(query(collection(db,'matches'),orderBy('createdAt','desc')));
    const matches=[];
    snap.forEach(d=>matches.push({id:d.id,...d.data()}));
    try{
      const hSnap=await getDoc(doc(db,'banners','hero'));
      if(hSnap.exists()) updateHero(hSnap.data());
    }catch(e){}
    renderMatches(matches);
  }catch(e){ renderMatches([]); }
}

function updateHero(data){
  if(data.bgImage){
    const img=document.getElementById('hero-bg-img');
    img.src=data.bgImage;img.style.display='block';
    document.getElementById('hero-bg-default').style.opacity='0.3';
  }
  if(data.tag) document.getElementById('hero-tag').textContent=data.tag;
  if(data.title){
    const parts=data.title.split('|');
    document.getElementById('hero-title').innerHTML=parts[0]+(parts[1]?` <span id="hero-highlight">${parts[1]}</span>`:'');
  }
  if(data.subtitle) document.getElementById('hero-sub').textContent=data.subtitle;
}

function renderMatches(matches){
  const c=document.getElementById('matches-container');
  if(!matches.length){
    c.innerHTML=`<div class="empty-state">
      <svg class="empty-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#ffc61a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <div class="empty-title">NO MATCHES HOSTED</div>
      <div class="empty-sub">Check back soon for upcoming tournaments</div>
    </div>`;
    return;
  }

  const winners=matches.filter(m=>m.status==='completed'&&m.winner);
  const active=matches.filter(m=>m.status!=='completed');
  let html='';

  if(winners.length){
    html+=`<div class="section-title" style="margin-bottom:16px;">TOURNAMENT RESULTS</div>`;
    winners.forEach(m=>{
      html+=`<div class="winner-card"><div class="winner-tag">CHAMPION - ${m.name}</div><div class="winner-name">${m.winner}</div><div class="winner-sub">${m.winnerSub||'TOURNAMENT WINNER'}</div></div>`;
    });
  }

  if(active.length){
    html+=`<div class="section-title" style="margin-bottom:16px;">LIVE TOURNAMENTS</div>`;
  }

  active.forEach((m,i)=>{
    const totalSlots=parseInt(m.slots)||12;
    const bookedSlots=confirmedSlots[m.id]||0;
    const pct=Math.min(100,Math.round(bookedSlots/totalSlots*100));
    const isFull=bookedSlots>=totalSlots;
    const matchClosed=(m.status||'open')==='closed';

    const userReg=userRegs[m.id];
    const userStatus=userReg?userReg.status:null;

    let btnTxt,btnClass,btnDisabled=true,btnIcon='';

    if(userStatus==='confirmed'){
      btnTxt='SLOT CONFIRMED';
      btnClass='register-btn state-confirmed';
      btnIcon=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else if(userStatus==='verifying'){
      btnTxt='PAYMENT UNDER REVIEW';
      btnClass='register-btn state-verifying';
      btnIcon=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
    } else if(isFull||matchClosed){
      btnTxt=isFull?'SLOTS FULL':'REGISTRATION CLOSED';
      btnClass='register-btn state-closed';
    } else {
      btnTxt=userStatus==='rejected'?'RE-REGISTER':'REGISTER NOW';
      btnClass='register-btn';
      btnDisabled=false;
    }

    const barColor=isFull?'var(--green)':'var(--gold)';
    const barLabel=isFull
      ? `<span style="color:#2fe28a;font-weight:700;">${bookedSlots}</span>/<span style="color:var(--text2);">${totalSlots}</span> FULL`
      : `<span style="color:#ffc61a;font-weight:700;">${bookedSlots}</span>/<span style="color:var(--text2);">${totalSlots}</span> BOOKED`;

    html+=`<div class="match-card" style="animation-delay:${i*0.08}s;">
      <div class="match-banner">
        ${m.image?`<img src="${m.image}" alt="${m.name}" loading="lazy"/>`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,#2b1e00,#161616);"></div>`}
        <div class="match-banner-overlay"></div>
        <div class="match-time-badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${m.time||'TBA'}
        </div>
        <div class="match-mode-badge">${m.mode||'BR · SQUAD'}</div>
      </div>
      <div class="match-body">
        <div class="match-name">${m.name||'TOURNAMENT'}</div>
        <div class="match-stats">
          <div class="stat-box"><div class="stat-label">SLOTS</div><div class="stat-value green">${bookedSlots}/${totalSlots}</div></div>
          <div class="stat-box"><div class="stat-label">ENTRY</div><div class="stat-value blue">${m.entry||0}₹</div></div>
          <div class="stat-box"><div class="stat-label">PRIZE POOL</div><div class="stat-value">${m.prize||'TBA'}</div></div>
          <div class="stat-box"><div class="stat-label">BOUNTY</div><div class="stat-value">${m.bounty||0}₹</div></div>
        </div>

        <div class="slot-progress">
          <div class="slot-progress-header">
            <span class="slot-progress-label">CONFIRMED SLOTS</span>
            <span class="slot-progress-count">${barLabel}</span>
          </div>
          <div class="slot-bar-track">
            <div class="slot-bar-fill" style="width:${pct}%;background:${barColor};"></div>
          </div>
        </div>

        <button class="${btnClass}" ${btnDisabled?'disabled':''} onclick="handleRegister('${m.id}')">
          ${btnIcon}${btnTxt}
        </button>
      </div>
    </div>`;
  });

  c.innerHTML=html;
}

window.handleRegister=(matchId)=>{
  if(!currentUser){ pendingMatchId=matchId; openSheet(); return; }
  const reg=userRegs[matchId];
  if(reg){
    if(reg.status==='confirmed'){ showToast('✓ YOUR SLOT IS CONFIRMED'); return; }
    if(reg.status==='verifying'){ showToast('⏳ PAYMENT IS UNDER REVIEW'); return; }
  }
  window.location.href=`reg.html?matchId=${matchId}`;
};

window.googleLogin=async()=>{
  try{
    await signInWithPopup(auth,provider);
    closeSheet();
    if(pendingMatchId) setTimeout(()=>window.location.href=`reg.html?matchId=${pendingMatchId}`,300);
  }catch(e){ showToast('LOGIN FAILED. TRY AGAIN.'); }
};

window.doLogout=async()=>{ await signOut(auth); showToast('LOGGED OUT'); };
window.openSheet=()=>{ document.getElementById('sheet-overlay').classList.add('open'); document.getElementById('bottom-sheet').classList.add('open'); };
window.closeSheet=()=>{ document.getElementById('sheet-overlay').classList.remove('open'); document.getElementById('bottom-sheet').classList.remove('open'); };
window.openSidebar=()=>{ document.getElementById('sidebar-overlay').classList.add('open'); document.getElementById('sidebar').classList.add('open'); };
window.closeSidebar=()=>{ document.getElementById('sidebar-overlay').classList.remove('open'); document.getElementById('sidebar').classList.remove('open'); };

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500); }
</script>
</body>
</html>
