<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>NOT HUMANS — Tournament Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{-webkit-tap-highlight-color:rgba(0,0,0,0);box-sizing:border-box;margin:0;padding:0;}
button,a,div,span,img,input,textarea,select,label{outline:none;-webkit-tap-highlight-color:transparent;}
img{-webkit-user-drag:none;-webkit-touch-callout:none;user-select:none;}
body{user-select:none;-webkit-user-select:none;font-family:'Rajdhani',sans-serif;background:#ffffff;color:#0a0a1a;overflow-x:hidden;}
input,textarea{user-select:text;-webkit-user-select:text;}
:focus{outline:none;}
button,a,.card,.item{cursor:pointer;}
:root{
  --blue:#1a6fff;--blue-dark:#0d4fd4;--blue-light:#4d8fff;--blue-pale:#e8f0ff;
  --black:#0a0a1a;--white:#ffffff;--gray:#f4f6fb;--gray2:#e8ecf5;
  --text:#0a0a1a;--text2:#4a5280;--border:#d0d8f0;
  --green:#00c853;--orange:#ff6b00;
}

/* LOADER */
#loader{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.loader-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(36px,10vw,72px);letter-spacing:-2px;display:flex;align-items:center;gap:4px;}
.loader-logo .s-letter{display:inline-block;opacity:0;transform:translateY(20px) scale(0.8);animation:sReveal 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards;}
.loader-logo .p-letter{display:inline-block;opacity:0;transform:translateY(20px);animation:sReveal 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.35s forwards;}
.loader-logo .d-letter{display:inline-block;opacity:0;transform:translateY(20px);animation:sReveal 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards;}
.loader-logo .era-text{display:inline-block;opacity:0;transform:translateX(10px);animation:fadeSlide 0.6s ease 0.8s forwards;color:var(--blue);margin-left:8px;font-size:0.45em;letter-spacing:4px;}
.loader-bar{width:180px;height:2px;background:var(--gray2);margin-top:24px;border-radius:2px;overflow:hidden;}
.loader-bar-fill{height:100%;width:0;background:var(--blue);border-radius:2px;animation:barFill 1.4s ease 0.3s forwards;}
@keyframes sReveal{0%{opacity:0;transform:translateY(20px) scale(0.8);}60%{opacity:1;transform:translateY(-4px) scale(1.05);}100%{opacity:1;transform:translateY(0) scale(1);}}
@keyframes fadeSlide{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:translateX(0);}}
@keyframes barFill{from{width:0;}to{width:100%;}}

/* NAVBAR */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1.5px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:16px;letter-spacing:1px;color:var(--black);text-decoration:none;display:flex;align-items:center;gap:2px;}
.nav-logo .era{color:var(--blue);}
.nav-right{display:flex;align-items:center;gap:10px;}
.logout-btn{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;padding:7px 14px;border:1.5px solid var(--black);background:transparent;color:var(--black);border-radius:4px;letter-spacing:1px;transition:all 0.2s;display:none;}
.logout-btn:hover{background:var(--black);color:#fff;}
.menu-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--blue);display:none;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;font-family:'Orbitron',sans-serif;}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.sidebar-overlay.open{opacity:1;pointer-events:all;}
.sidebar{position:fixed;right:0;top:0;bottom:0;width:280px;background:#fff;border-left:1.5px solid var(--border);z-index:201;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;padding:24px 20px;}
.sidebar.open{transform:translateX(0);}
.sidebar-close{width:36px;height:36px;background:none;border:none;display:flex;align-items:center;justify-content:center;margin-bottom:32px;cursor:pointer;}
.sidebar-link{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--gray2);font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--black);text-decoration:none;transition:color 0.2s;}
.sidebar-link:hover{color:var(--blue);}
.sidebar-link svg{flex-shrink:0;}

/* HERO */
.hero{position:relative;min-height:50vw;max-height:380px;overflow:hidden;background:#0a0a1a;display:flex;align-items:flex-end;}
.hero-bg{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:0.6;transition:opacity 0.5s;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,26,0.2) 0%,rgba(10,10,26,0.85) 100%);}
.hero-content{position:relative;z-index:1;padding:28px 20px;width:100%;}
.hero-tag{display:inline-flex;align-items:center;background:var(--blue);color:#fff;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:2px;margin-bottom:10px;}
.hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(26px,7vw,48px);font-weight:900;color:#fff;line-height:1.05;letter-spacing:-0.5px;}
.hero-title span{color:var(--blue);}
.hero-sub{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:4px;color:rgba(255,255,255,0.5);margin-top:6px;text-transform:uppercase;}

/* SECTION */
.section{padding:20px 16px;}
.section-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--text2);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* MATCH CARD */
.match-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;transition:transform 0.2s,box-shadow 0.2s;animation:cardIn 0.5s ease both;}
.match-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(26,111,255,0.12);}
@keyframes cardIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.match-banner{position:relative;aspect-ratio:16/7;overflow:hidden;background:linear-gradient(135deg,#0a0a1a,#1a2040);}
.match-banner img{width:100%;height:100%;object-fit:cover;}
.match-banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.7) 100%);}
.match-time-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);color:#fff;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:600;letter-spacing:1px;padding:5px 10px;border-radius:4px;display:flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,0.15);}
.match-mode-badge{position:absolute;top:10px;right:10px;background:var(--blue);color:#fff;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;padding:5px 10px;border-radius:4px;}
.match-body{padding:14px 16px;}
.match-name{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:800;color:var(--blue);letter-spacing:0.5px;margin-bottom:12px;}
.match-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-box{background:var(--gray);border-radius:8px;padding:10px 12px;}
.stat-label{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:600;letter-spacing:1.5px;color:var(--text2);text-transform:uppercase;margin-bottom:4px;}
.stat-value{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:800;color:var(--black);}
.stat-value.green{color:var(--green);}
.stat-value.blue{color:var(--blue);}

/* ── SLOT PROGRESS BAR (shown above register button) ── */
.slot-progress{margin-bottom:12px;}
.slot-progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.slot-progress-label{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--text2);text-transform:uppercase;}
.slot-progress-count{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:800;color:var(--black);}
.slot-progress-count .confirmed{color:var(--green);}
.slot-progress-count .total{color:var(--text2);}
.slot-bar-track{height:6px;background:var(--gray2);border-radius:3px;overflow:hidden;}
.slot-bar-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}

/* REGISTER BUTTON STATES */
.register-btn{width:100%;background:var(--blue);color:#fff;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;padding:14px;border:none;border-radius:8px;transition:background 0.2s,transform 0.1s;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;}
.register-btn:hover{background:var(--blue-dark);}
.register-btn:active{transform:scale(0.98);}
.register-btn:disabled,.register-btn[disabled]{pointer-events:none;}
/* confirmed — green */
.register-btn.state-confirmed{background:rgba(0,200,83,0.12);color:var(--green);border:1.5px solid rgba(0,200,83,0.4);}
/* verifying — orange */
.register-btn.state-verifying{background:rgba(255,107,0,0.1);color:var(--orange);border:1.5px solid rgba(255,107,0,0.35);}
/* full / closed — muted */
.register-btn.state-closed{background:var(--gray2);color:var(--text2);}

/* WINNER CARD */
.winner-card{background:linear-gradient(135deg,#0a0a1a 0%,#0d1a40 100%);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--blue);position:relative;overflow:hidden;}
.winner-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(26,111,255,0.3),transparent);border-radius:50%;}
.winner-tag{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:8px;}
.winner-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:1px;}
.winner-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:4px;font-family:'Orbitron',sans-serif;letter-spacing:1px;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{margin:0 auto 20px;}
.empty-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--text2);margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--text2);opacity:0.6;}

/* LOGIN SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;z-index:301;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);padding:0 24px 40px;max-height:70vh;overflow-y:auto;}
.bottom-sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--gray2);border-radius:2px;margin:14px auto 24px;}
.sheet-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;color:var(--black);margin-bottom:6px;}
.sheet-sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.5;}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--black);transition:all 0.2s;margin-bottom:12px;}
.google-btn:hover{border-color:var(--blue);background:var(--blue-pale);}
.sheet-note{text-align:center;font-size:11px;color:var(--text2);opacity:0.6;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--black);color:#fff;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;padding:12px 20px;border-radius:8px;z-index:999;opacity:0;transition:all 0.3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:400px){.hero-title{font-size:28px;}}
</style>
</head>

  </div>
</div>

<!-- LOGIN SHEET -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">JOIN THE BATTLE</div>
  <div class="sheet-sub">Sign in with Google to register your squad for this tournament.</div>
  <button class="google-btn" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    CONTINUE WITH GOOGLE
  </button>
  <div class="sheet-note">Your data is secure and only used for registration.</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
import{getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
import{getFirestore,collection,getDocs,query,orderBy,doc,getDoc,where,onSnapshot}from'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyDrg8CHeOGiPR9kFLSTreRbP4p8TGF9jMY",
  authDomain:"nothumans-7e285.firebaseapp.com",
  projectId:"nothumans-7e285",
  storageBucket:"nothumans-7e285.firebasestorage.app",
  messagingSenderId:"409725804600",
  appId:"1:409725804600:web:ec0344bf1ac49a55edc6cd"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

let currentUser=null;
let pendingMatchId=null;

// confirmedSlots[matchId] = number of admin-confirmed registrations
let confirmedSlots={};
// userRegs[matchId] = {status, docId} — only for the current logged-in user
let userRegs={};

// Realtime listener handle for live progress bar updates
let slotCountsUnsub = null;

// Setup realtime listener for slotCounts so that when admin confirms slots,
// the progress bars on public site update IMMEDIATELY without refresh
function setupSlotCountsListener() {
  if (slotCountsUnsub) slotCountsUnsub();
  slotCountsUnsub = onSnapshot(collection(db, 'slotCounts'), (snapshot) => {
    confirmedSlots = {};
    snapshot.forEach((d) => {
      const val = d.data().confirmed;
      if (typeof val === 'number') confirmedSlots[d.id] = val;
    });
    // Live update: refresh matches UI with new confirmed counts (progress bar moves immediately)
    const c = document.getElementById('matches-container');
    if (c) {
      loadMatches();
    }
  }, (err) => {
    console.warn('slotCounts realtime listener error:', err);
  });
}

// Hide loader
setTimeout(()=>{
  const l=document.getElementById('loader');
  l.style.transition='opacity 0.5s';l.style.opacity='0';
  setTimeout(()=>l.style.display='none',500);
},2000);

// Auth state
onAuthStateChanged(auth,async user=>{
  currentUser=user;
  const lb=document.getElementById('logout-btn');
  const av=document.getElementById('user-avatar');
  if(user){
    lb.style.display='block';
    av.style.display='flex';
    av.textContent=user.displayName?user.displayName[0].toUpperCase():'U';
  }else{
    lb.style.display='none';
    av.style.display='none';
    userRegs={};
  }
  await loadData(user);
});

// Load social links from settings
async function loadSocialLinks(){
  try{
    const snap=await getDoc(doc(db,'settings','global'));
    if(snap.exists()){
      const d=snap.data();
      if(d.instagram){
        let u=d.instagram.trim();
        if(!u.startsWith('http')) u='https://instagram.com/'+u.replace('@','');
        document.getElementById('link-instagram').href=u;
      }
      if(d.discord) document.getElementById('link-discord').href=d.discord.trim();
      if(d.whatsapp){
        let u=d.whatsapp.trim();
        if(!u.startsWith('http')) u='https://wa.me/'+u.replace(/\D/g,'');
        document.getElementById('link-whatsapp').href=u;
      }
    }
  }catch(e){}
}
loadSocialLinks();
setupSlotCountsListener();

// Main data load — registrations + matches
async function loadData(user){
  confirmedSlots={};
  userRegs={};

  try{
    if(user){
      // Load THIS user's own registrations (rules allow own-data reads)
      try{
        const regSnap=await getDocs(query(collection(db,'registrations'),where('userId','==',user.uid)));
        regSnap.forEach(d=>{
          const data=d.data();
          if(!userRegs[data.matchId] || data.status!=='rejected'){
            userRegs[data.matchId]={status:data.status||'verifying',docId:d.id};
          }
        });
      }catch(e){ console.warn('User regs load failed',e); }
    }

    // Initial load of confirmed slot counts (listener will keep it live-updated after)
    try{
      const scSnap=await getDocs(collection(db,'slotCounts'));
      scSnap.forEach(d=>{
        const val=d.data().confirmed;
        if(typeof val==='number') confirmedSlots[d.id]=val;
      });
    }catch(e){ console.warn('slotCounts read failed',e); }

  }catch(e){ console.warn('loadData error',e); }

  await loadMatches();
}

async function loadMatches(){
  try{
    const snap=await getDocs(query(collection(db,'matches'),orderBy('createdAt','desc')));
    const matches=[];
    snap.forEach(d=>matches.push({id:d.id,...d.data()}));
    try{
      const hSnap=await getDoc(doc(db,'banners','hero'));
      if(hSnap.exists()) updateHero(hSnap.data());
    }catch(e){}
    renderMatches(matches);
  }catch(e){ renderMatches([]); }
}

function updateHero(data){
  if(data.bgImage){
    const img=document.getElementById('hero-bg-img');
    img.src=data.bgImage;img.style.display='block';
    document.getElementById('hero-bg-default').style.opacity='0.3';
  }
  if(data.tag) document.getElementById('hero-tag').textContent=data.tag;
  if(data.title){
    const parts=data.title.split('|');
    document.getElementById('hero-title').innerHTML=parts[0]+(parts[1]?` <span id="hero-highlight">${parts[1]}</span>`:'');
  }
  if(data.subtitle) document.getElementById('hero-sub').textContent=data.subtitle;
}

function renderMatches(matches){
  const c=document.getElementById('matches-container');
  if(!matches.length){
    c.innerHTML=`<div class="empty-state">
      <svg class="empty-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#1a6fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <div class="empty-title">NO MATCHES HOSTED</div>
      <div class="empty-sub">Check back soon for upcoming tournaments</div>
    </div>`;
    return;
  }

  const winners=matches.filter(m=>m.status==='completed'&&m.winner);
  const active=matches.filter(m=>m.status!=='completed');
  let html='';

  if(winners.length){
    html+=`<div class="section-title" style="font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:#4a5280;display:flex;align-items:center;gap:10px;margin-bottom:16px;">TOURNAMENT RESULTS<div style="flex:1;height:1px;background:#d0d8f0;"></div></div>`;
    winners.forEach(m=>{
      html+=`<div class="winner-card"><div class="winner-tag">CHAMPION - ${m.name}</div><div class="winner-name">${m.winner}</div><div class="winner-sub">${m.winnerSub||'TOURNAMENT WINNER'}</div></div>`;
    });
  }

  if(active.length){
    html+=`<div class="section-title" style="font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:#4a5280;display:flex;align-items:center;gap:10px;margin-bottom:16px;">LIVE TOURNAMENTS<div style="flex:1;height:1px;background:#d0d8f0;"></div></div>`;
  }

  active.forEach((m,i)=>{
    const totalSlots=parseInt(m.slots)||12;
    // CONFIRMED slots only (admin-approved registrations)
    const bookedSlots=confirmedSlots[m.id]||0;
    const pct=Math.min(100,Math.round(bookedSlots/totalSlots*100));
    const isFull=bookedSlots>=totalSlots;
    const matchClosed=(m.status||'open')==='closed';

    // User-specific state for THIS match
    const userReg=userRegs[m.id]; // {status, docId} or undefined
    const userStatus=userReg?userReg.status:null; // 'confirmed'|'verifying'|'rejected'|null

    // ── Determine button state ──
    let btnTxt, btnClass, btnDisabled=true, btnIcon='';

    if(userStatus==='confirmed'){
      btnTxt='SLOT CONFIRMED';
      btnClass='register-btn state-confirmed';
      btnIcon=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else if(userStatus==='verifying'){
      btnTxt='PAYMENT UNDER REVIEW';
      btnClass='register-btn state-verifying';
      btnIcon=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
    } else if(isFull||matchClosed){
      btnTxt=isFull?'SLOTS FULL':'REGISTRATION CLOSED';
      btnClass='register-btn state-closed';
    } else {
      // userStatus===null or 'rejected' → allow registration
      btnTxt=userStatus==='rejected'?'RE-REGISTER':'REGISTER NOW';
      btnClass='register-btn';
      btnDisabled=false;
    }

    // ── Bar color: green when full, blue otherwise ──
    const barColor=isFull?'#00c853':'#1a6fff';
    // ── Bar label ──
    const barLabel=isFull
      ? `<span style="color:#00c853;font-weight:900;">${bookedSlots}</span>/<span style="color:var(--text2);">${totalSlots}</span> FULL`
      : `<span style="color:#0a0a1a;font-weight:900;">${bookedSlots}</span>/<span style="color:var(--text2);">${totalSlots}</span> BOOKED`;

    html+=`<div class="match-card" style="animation-delay:${i*0.08}s;">
      <div class="match-banner">
        ${m.image?`<img src="${m.image}" alt="${m.name}" loading="lazy"/>`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,#0a0a1a,#0d1a40);"></div>`}
        <div class="match-banner-overlay"></div>
        <div class="match-time-badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${m.time||'TBA'}
        </div>
        <div class="match-mode-badge">${m.mode||'BR · SQUAD'}</div>
      </div>
      <div class="match-body">
        <div class="match-name">${m.name||'TOURNAMENT'}</div>
        <div class="match-stats">
          <div class="stat-box"><div class="stat-label">SLOTS</div><div class="stat-value green">${bookedSlots}/${totalSlots}</div></div>
          <div class="stat-box"><div class="stat-label">ENTRY</div><div class="stat-value blue">${m.entry||0}₹</div></div>
          <div class="stat-box"><div class="stat-label">PRIZE POOL</div><div class="stat-value">${m.prize||'TBA'}</div></div>
          <div class="stat-box"><div class="stat-label">BOUNTY</div><div class="stat-value">${m.bounty||0}₹</div></div>
        </div>

        <!-- SLOT PROGRESS BAR -->
        <div class="slot-progress">
          <div class="slot-progress-header">
            <span class="slot-progress-label">CONFIRMED SLOTS</span>
            <span class="slot-progress-count">${barLabel}</span>
          </div>
          <div class="slot-bar-track">
            <div class="slot-bar-fill" style="width:${pct}%;background:${barColor};"></div>
          </div>
        </div>

        <button class="${btnClass}" ${btnDisabled?'disabled':''} onclick="handleRegister('${m.id}')">
          ${btnIcon}${btnTxt}
        </button>
      </div>
    </div>`;
  });

  c.innerHTML=html;
}

window.handleRegister=(matchId)=>{
  if(!currentUser){ pendingMatchId=matchId; openSheet(); return; }
  const reg=userRegs[matchId];
  if(reg){
    if(reg.status==='confirmed'){ showToast('✓ YOUR SLOT IS CONFIRMED'); return; }
    if(reg.status==='verifying'){ showToast('⏳ PAYMENT IS UNDER REVIEW'); return; }
    // rejected → allow re-registration (fall through)
  }
  window.location.href=`reg.html?matchId=${matchId}`;
};

window.googleLogin=async()=>{
  try{
    await signInWithPopup(auth,provider);
    closeSheet();
    if(pendingMatchId) setTimeout(()=>window.location.href=`reg.html?matchId=${pendingMatchId}`,300);
  }catch(e){ showToast('LOGIN FAILED. TRY AGAIN.'); }
};

window.doLogout=async()=>{ await signOut(auth); showToast('LOGGED OUT'); };
window.openSheet=()=>{ document.getElementById('sheet-overlay').classList.add('open'); document.getElementById('bottom-sheet').classList.add('open'); };
window.closeSheet=()=>{ document.getElementById('sheet-overlay').classList.remove('open'); document.getElementById('bottom-sheet').classList.remove('open'); };
window.openSidebar=()=>{ document.getElementById('sidebar-overlay').classList.add('open'); document.getElementById('sidebar').classList.add('open'); };
window.closeSidebar=()=>{ document.getElementById('sidebar-overlay').classList.remove('open'); document.getElementById('sidebar').classList.remove('open'); };

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500); }
</script>
</body>
</html>
